<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Orbital Dashboard{% endblock %}</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; color: #222; }
        header { background: #1f2937; color: #fff; padding: 12px 20px; }
        main { max-width: 1100px; margin: 16px auto; padding: 0 16px 24px; }
        a { color: #0f62fe; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .row { display: flex; gap: 16px; align-items: flex-start; }
        .col { flex: 1; }
        .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 14px; margin-bottom: 14px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: 8px; vertical-align: top; }
        th { background: #fafafa; }
        label { display: block; margin: 8px 0 4px; font-size: 14px; }
        input, select, textarea { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
        textarea { min-height: 90px; }
        .actions { margin-top: 10px; display: flex; gap: 8px; }
        button { padding: 8px 12px; border: 1px solid #333; background: #111; color: #fff; border-radius: 4px; cursor: pointer; }
        button.secondary { background: #fff; color: #222; }
        .flash { padding: 10px; border-radius: 4px; margin-bottom: 12px; }
        .flash.success { background: #e7f8ee; border: 1px solid #88d3a8; }
        .flash.error { background: #fdeaea; border: 1px solid #e9a1a1; }
        .flash.warning { background: #fff7e6; border: 1px solid #eabf75; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 700; line-height: 1.4; border: 1px solid transparent; }
        .status-pending { background: #fff7d6; color: #8a6100; border-color: #efd47a; }
        .status-running { background: #e7f0ff; color: #1d4ed8; border-color: #a7c3ff; }
        .status-success { background: #e8f8ef; color: #15803d; border-color: #8cd5a8; }
        .status-failed { background: #feecec; color: #b91c1c; border-color: #f2a0a0; }
        .status-unknown { background: #f3f4f6; color: #374151; border-color: #d1d5db; }
        .error-box { background: #fff1f1; border: 1px solid #f2b2b2; border-left: 4px solid #d22; border-radius: 4px; padding: 10px; margin: 8px 0; }
        .step-card { border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px; margin-bottom: 10px; }
        .step-card.failed { background: #fff6f6; border-color: #efb1b1; border-left: 4px solid #c81e1e; }
        .stderr-title { color: #b91c1c; font-weight: 700; }
        .pre-stderr { border: 1px solid #b91c1c; }
        pre { background: #0b1020; color: #e2e8f0; padding: 12px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; }
        .muted { color: #6b7280; font-size: 13px; }
        @media (max-width: 900px) {
            .row { flex-direction: column; }
        }
    </style>
</head>
<body>
<header>
    <strong>Orbital Internal Dashboard</strong>
    <span style="margin-left: 14px;" class="muted">Nur interne Entwicklungsnutzung</span>
    <span style="margin-left: 14px;"><a style="color: #dbeafe;" href="{{ url_for('dashboard.hetzner_settings') }}">Hetzner Konfiguration</a></span>
</header>
<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>
</body>
</html>
